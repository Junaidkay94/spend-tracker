<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spend</title>
<style>
:root{
  --bg:#F5FAF5;--card:#fff;--header:#3A7D5A;--green:#3A7D5A;--green-lt:#E8F5EE;
  --red:#D94F4F;--red-lt:#FDE8E8;--amber:#E8900A;--amber-lt:#FFF3DC;
  --ink:#1A2E22;--muted:#6B8A74;--border:#DFF0E5;--shadow:0 2px 10px rgba(0,0,0,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  max-width:480px;margin:0 auto;min-height:100vh;}

/* ── PIN ── */
.pin-screen{position:fixed;inset:0;background:var(--header);z-index:300;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;max-width:480px;margin:0 auto;}
.pin-screen.gone{display:none;}
.pin-brand{font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px;}
.pin-sub{font-size:13px;color:rgba(255,255,255,.75);}
.pin-dots{display:flex;gap:14px;}
.pdot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.5);transition:all .15s;}
.pdot.on{background:#fff;border-color:#fff;transform:scale(1.15);}
.pin-err{color:#FFB0B0;font-size:13px;min-height:18px;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.pkey{background:rgba(255,255,255,.13);border:none;color:#fff;font-size:22px;font-weight:600;
  border-radius:50%;width:68px;height:68px;cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;transition:background .1s;}
.pkey:active{background:rgba(255,255,255,.3);}
.pkey.ghost{background:transparent;pointer-events:none;}
.pin-hint{font-size:11px;color:rgba(255,255,255,.4);}

/* ── LAYOUT ── */
.topbar{background:var(--header);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.topbar .brand{font-size:20px;font-weight:800;letter-spacing:-.5px;}
.topbar .icons{display:flex;gap:4px;}
.tico{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:10px;
  font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;}
.tico:active{background:rgba(255,255,255,.3);}

/* ── MONTH NAV ── */
.month-row{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 0 8px;}
.mnav{background:none;border:none;font-size:22px;color:var(--green);cursor:pointer;padding:4px 14px;}
.mlabel{font-size:16px;font-weight:700;color:var(--ink);}

/* ── SUMMARY CARDS ── */
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;}
.scard{background:var(--card);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);}
.scard .sk{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.scard .sv{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.scard.inc .sv{color:var(--green);}
.scard.exp .sv{color:var(--red);}
.bal-card{margin:10px 14px 0;background:var(--green);border-radius:16px;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);}
.bal-card .bk{font-size:13px;color:rgba(255,255,255,.8);}
.bal-card .bv{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.5px;}

/* ── SYNC ── */
.syncbar{display:flex;align-items:center;gap:7px;padding:8px 16px 4px;font-size:11px;color:var(--muted);}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sdot.ok{background:var(--green);}
.sdot.err{background:var(--red);}
.sdot.spin{background:var(--amber);animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── CHART ── */
.chart-wrap{margin:14px 14px 0;background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow);}
.chart-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.bars{display:flex;align-items:flex-end;gap:6px;height:80px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-inner{width:100%;border-radius:6px 6px 0 0;min-height:3px;transition:height .4s;}
.bar-lbl{font-size:9px;color:var(--muted);font-weight:600;}
.bar-amt{font-size:8px;color:var(--ink);font-weight:700;}

/* ── CAT SECTION ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px;}
.sec-hdr h2{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.sec-hdr button{background:var(--green-lt);border:none;color:var(--green);font-size:12px;font-weight:700;
  padding:6px 12px;border-radius:20px;cursor:pointer;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 12px 120px;}
.ccard{background:var(--card);border-radius:16px;padding:10px 4px 8px;display:flex;flex-direction:column;
  align-items:center;gap:5px;cursor:pointer;box-shadow:var(--shadow);position:relative;
  transition:transform .12s;-webkit-user-select:none;user-select:none;overflow:hidden;}
.ccard:active{transform:scale(.91);}
.ccard .cico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.ccard .cnm{font-size:9.5px;font-weight:700;color:var(--muted);text-align:center;line-height:1.2;}
.ccard .camt{font-size:11px;font-weight:800;color:var(--ink);}
.ccard .cprog{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border);}
.ccard .cprog-fill{height:100%;border-radius:0 2px 2px 0;transition:width .4s;}

/* ── KEYPAD MODAL ── */
.modal{position:fixed;inset:0;background:rgba(10,30,15,.55);z-index:100;display:none;
  align-items:flex-end;justify-content:center;}
.modal.on{display:flex;}
.msheet{background:var(--card);width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:18px 16px 26px;}
.mhead{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.mhead .mico{width:42px;height:42px;border-radius:12px;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mhead .mcat{flex:1;font-size:16px;font-weight:700;}
.mhead .mcat select{border:none;background:none;font-size:14px;font-weight:600;color:var(--green);outline:none;cursor:pointer;-webkit-user-select:text;user-select:text;}
.mhead .mclose{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;padding:4px 8px;}
.toggle{display:flex;background:#F0F7F2;border-radius:12px;padding:3px;margin-bottom:12px;}
.toggle button{flex:1;padding:8px;border:none;background:transparent;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s;}
.toggle button.on.e{background:var(--red);color:#fff;}
.toggle button.on.i{background:var(--green);color:#fff;}
.amtdisp{text-align:right;font-size:42px;font-weight:800;letter-spacing:-1.5px;
  padding:6px 8px 2px;min-height:60px;color:var(--ink);}
.amtdisp .cur{font-size:18px;color:var(--muted);margin-right:3px;font-weight:600;}
.fields{display:flex;gap:8px;margin-bottom:10px;}
.fields input{flex:1;border:none;border-bottom:2px solid var(--border);padding:7px 4px;
  font-size:13px;outline:none;color:var(--ink);background:transparent;-webkit-user-select:text;user-select:text;}
.fields input::placeholder{color:var(--muted);}
.kpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.kpad button{padding:15px 6px;font-size:21px;font-weight:700;border:none;
  background:#F4FAF5;border-radius:13px;cursor:pointer;color:var(--ink);transition:background .1s;}
.kpad button:active{background:var(--border);}
.kpad .ksave{grid-column:span 3;font-size:16px;font-weight:700;border-radius:13px;color:#fff;padding:15px;}
.kpad .ksave.e{background:var(--red);}
.kpad .ksave.i{background:var(--green);}

/* ── FULLSCREEN SHEETS ── */
.fsheet{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;max-width:480px;margin:0 auto;}
.fsheet.on{display:flex;}
.fshead{background:var(--header);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.fsback{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;}
.fstitle{font-size:17px;font-weight:700;}
.fssub{font-size:11px;opacity:.8;margin-top:1px;}
.fsbody{flex:1;overflow-y:auto;padding:14px;}

/* ── HISTORY ── */
.search-bar{position:relative;margin-bottom:14px;}
.search-bar input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:11px 14px 11px 38px;font-size:14px;outline:none;color:var(--ink);-webkit-user-select:text;user-select:text;}
.search-bar input:focus{border-color:var(--green);}
.search-bar .sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;}
.day-grp{margin-bottom:16px;}
.dlabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;padding:0 2px;}
.hrow{background:var(--card);border-radius:14px;padding:12px;margin-bottom:6px;
  display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;}
.hrow:active{background:#F5FAF5;}
.hico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hinfo{flex:1;}
.hinfo .hcat{font-size:13px;font-weight:700;}
.hinfo .hnote{font-size:11px;color:var(--muted);margin-top:1px;}
.hinfo .htime{font-size:10px;color:var(--muted);}
.hamt{font-size:14px;font-weight:800;}
.hamt.e{color:var(--red);}
.hamt.i{color:var(--green);}
.hdel{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:4px 6px;flex-shrink:0;}

/* ── CAT MANAGER ── */
.cat-item{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.cat-item .cico2{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cat-item .cinfo{flex:1;}
.cat-item .cname{font-size:14px;font-weight:700;}
.cat-item .cspent{font-size:11px;color:var(--muted);}
.cat-item .cedit{background:var(--green-lt);border:none;color:var(--green);font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;cursor:pointer;margin-right:6px;}
.cat-item .cdel{background:var(--red-lt);border:none;color:var(--red);font-size:12px;font-weight:700;padding:6px 10px;border-radius:20px;cursor:pointer;}
.add-cat-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}

/* ── EXPORT ── */
.export-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.export-card h3{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--ink);}
.export-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.export-row:last-child{border:none;font-weight:700;}
.export-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
.export-btn.sec{background:var(--green-lt);color:var(--green);margin-top:8px;}

/* ── CAT EDIT MODAL ── */
.cemodal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;display:none;align-items:flex-end;justify-content:center;}
.cemodal.on{display:flex;}
.cesheet{background:var(--card);width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:20px 16px 28px;}
.cesheet h3{font-size:16px;font-weight:700;margin-bottom:14px;}
.cesheet input[type=text]{width:100%;border:2px solid var(--border);border-radius:12px;padding:12px;font-size:15px;outline:none;color:var(--ink);margin-bottom:12px;-webkit-user-select:text;user-select:text;}
.cesheet input[type=text]:focus{border-color:var(--green);}
.emoji-pick{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.emoji-pick span{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;background:var(--bg);border:2px solid transparent;transition:border .1s;}
.emoji-pick span.sel{border-color:var(--green);}
.color-pick{display:flex;gap:10px;margin-bottom:16px;}
.color-pick span{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.color-pick span.sel{border-color:var(--ink);}
.bgt-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.bgt-row label{font-size:13px;color:var(--muted);white-space:nowrap;}
.bgt-row input{flex:1;border:2px solid var(--border);border-radius:10px;padding:10px;font-size:14px;outline:none;-webkit-user-select:text;user-select:text;}
.ce-save{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#1A2E22;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:13px;line-height:1.8;}
</style>
</head>
<body>

<!-- PIN -->
<div class="pin-screen" id="pinScr">
  <div class="pin-brand">Spend</div>
  <div class="pin-sub" id="pinSub">Enter PIN</div>
  <div class="pin-dots">
    <div class="pdot" id="pd0"></div><div class="pdot" id="pd1"></div>
    <div class="pdot" id="pd2"></div><div class="pdot" id="pd3"></div>
  </div>
  <div class="pin-err" id="pinErr"></div>
  <div class="pin-pad">
    <button class="pkey" onclick="pp('1')">1</button><button class="pkey" onclick="pp('2')">2</button><button class="pkey" onclick="pp('3')">3</button>
    <button class="pkey" onclick="pp('4')">4</button><button class="pkey" onclick="pp('5')">5</button><button class="pkey" onclick="pp('6')">6</button>
    <button class="pkey" onclick="pp('7')">7</button><button class="pkey" onclick="pp('8')">8</button><button class="pkey" onclick="pp('9')">9</button>
    <div class="pkey ghost"></div><button class="pkey" onclick="pp('0')">0</button><button class="pkey" onclick="pdel()">⌫</button>
  </div>

</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">Spend</div>
  <div class="icons">
    <button class="tico" id="btnExport" title="Export">📤</button>
    <button class="tico" id="btnCats" title="Categories">🏷️</button>
    <button class="tico" id="btnHist" title="History">📋</button>
    <button class="tico" id="btnLock" title="Lock">🔒</button>
  </div>
</div>

<!-- MAIN -->
<div class="month-row">
  <button class="mnav" id="prevM">‹</button>
  <span class="mlabel" id="mLabel">—</span>
  <button class="mnav" id="nextM">›</button>
</div>
<div class="summary">
  <div class="scard inc"><div class="sk">Income</div><div class="sv" id="incVal">Rs 0</div></div>
  <div class="scard exp"><div class="sk">Spent</div><div class="sv" id="expVal">Rs 0</div></div>
</div>
<div class="bal-card">
  <span class="bk">Balance</span>
  <span class="bv" id="balVal">Rs 0</span>
</div>
<div class="syncbar"><div class="sdot" id="sdot"></div><span id="slbl">Connecting…</span></div>

<!-- CHART -->
<div class="chart-wrap">
  <div class="chart-title">Last 6 months spending</div>
  <div class="bars" id="chartBars"></div>
</div>

<!-- CATEGORIES -->
<div class="sec-hdr"><h2>Categories</h2><button id="btnAddCat">+ Add</button></div>
<div class="cat-grid" id="catGrid"></div>

<!-- ADD ENTRY MODAL -->
<div class="modal" id="modal">
  <div class="msheet">
    <div class="mhead">
      <div class="mico" id="mIco"></div>
      <div class="mcat">
        <select id="mCatSel"></select>
      </div>
      <button class="mclose" id="mClose">✕</button>
    </div>
    <div class="toggle">
      <button id="tExp" class="on e">− Expense</button>
      <button id="tInc">+ Income</button>
    </div>
    <div class="amtdisp"><span class="cur">Rs</span><span id="dispAmt">0</span></div>
    <div class="fields">
      <input id="noteIn" placeholder="Note (optional)" />
      <input type="date" id="dateIn" />
      <input type="time" id="timeIn" />
    </div>
    <div class="kpad" id="kpad"></div>
  </div>
</div>

<!-- HISTORY SHEET -->
<div class="fsheet" id="histSheet">
  <div class="fshead">
    <button class="fsback" id="histBack">‹</button>
    <div><div class="fstitle">History</div><div class="fssub" id="histSub"></div></div>
  </div>
  <div class="fsbody">
    <div class="search-bar"><span class="sico">🔍</span><input id="searchIn" placeholder="Search expenses…" /></div>
    <div id="histBody"></div>
  </div>
</div>

<!-- CATEGORIES MANAGER -->
<div class="fsheet" id="catsSheet">
  <div class="fshead">
    <button class="fsback" id="catsBack">‹</button>
    <div><div class="fstitle">Categories</div><div class="fssub">Tap Edit to rename, recolor, set budget</div></div>
  </div>
  <div class="fsbody" id="catsBody"></div>
</div>

<!-- EXPORT SHEET -->
<div class="fsheet" id="exportSheet">
  <div class="fshead">
    <button class="fsback" id="exportBack">‹</button>
    <div><div class="fstitle">Export</div><div class="fssub" id="exportSub"></div></div>
  </div>
  <div class="fsbody" id="exportBody"></div>
</div>

<!-- CAT EDIT MODAL -->
<div class="cemodal" id="ceModal">
  <div class="cesheet">
    <h3 id="ceTitle">Edit Category</h3>
    <input type="text" id="ceName" placeholder="Category name" />
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Pick an icon</div>
    <div class="emoji-pick" id="emojiPick"></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Pick a color</div>
    <div class="color-pick" id="colorPick"></div>
    <div class="bgt-row">
      <label>Monthly budget (Rs)</label>
      <input type="number" id="ceBudget" placeholder="Optional" inputmode="decimal" />
    </div>
    <button class="ce-save" id="ceSave">Save</button>
  </div>
</div>

<!-- EDIT ENTRY MODAL -->
<div class="cemodal" id="editModal">
  <div class="cesheet">
    <h3>Edit Entry</h3>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Category</div>
    <select id="editCat" style="width:100%;border:2px solid var(--border);border-radius:12px;padding:11px;font-size:14px;margin-bottom:12px;outline:none;-webkit-user-select:text;user-select:text;"></select>
    <input type="number" id="editAmt" placeholder="Amount (Rs)" inputmode="decimal" style="width:100%;border:2px solid var(--border);border-radius:12px;padding:12px;font-size:15px;outline:none;margin-bottom:12px;-webkit-user-select:text;user-select:text;" />
    <input type="text" id="editNote" placeholder="Note (optional)" />
    <div class="bgt-row" style="margin-top:12px;">
      <input type="date" id="editDate" style="flex:1;border:2px solid var(--border);border-radius:10px;padding:10px;font-size:13px;outline:none;" />
      <input type="time" id="editTime" style="flex:1;border:2px solid var(--border);border-radius:10px;padding:10px;font-size:13px;outline:none;" />
    </div>
    <button class="ce-save" id="editSave" style="margin-top:14px;">Save Changes</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MNS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DN=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const STORE="spendV5"; const PSTORE="spendPIN5"; const CSTORE="spendCats5";

const BIN_ID="6a2d66c8da38895dfeba4d8f";

// ── SYNC ────────────────────────────────────────
function ss(st,msg){document.getElementById("sdot").className="sdot "+st;document.getElementById("slbl").textContent=msg;}
async function syncNow(){
  ss("spin","Syncing…");
  try{
    const r=await fetch(BURL+"/latest",{headers:{"X-Master-Key":AKEY}});
    const j=await r.json(); const rem=j.record||{};
    if(rem.tx&&rem.tx.length){
      const rids=new Set(rem.tx.map(t=>String(t.id)));
      const lo=db.tx.filter(t=>!rids.has(String(t.id)));
      db.tx=[...rem.tx,...lo]; db.tx.sort((a,b)=>Number(b.id)-Number(a.id));
      saveDb();
    }
    if(rem.cats&&rem.cats.length){cats=rem.cats;saveCats();}
    ss("ok","Synced · "+new Date().toLocaleTimeString("en-PK",{hour:"2-digit",minute:"2-digit"}));
    render();
  }catch(e){ss("err","Sync failed");}
}
async function push(){
  try{
    await fetch(BURL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":AKEY},
      body:JSON.stringify({tx:db.tx,cats})});
    ss("ok","Saved · "+new Date().toLocaleTimeString("en-PK",{hour:"2-digit",minute:"2-digit"}));
  }catch(e){ss("err","Save failed");}
}

// ── HELPERS ─────────────────────────────────────
function nowDate(){return new Date().toISOString().slice(0,10);}
function nowTime(){return new Date().toTimeString().slice(0,5);}
function fmtDT(iso){
  if(!iso)return"";
  const d=new Date(iso);
  const h=d.getHours()%12||12,m=String(d.getMinutes()).padStart(2,"0"),ap=d.getHours()>=12?"pm":"am";
  return `${DN[d.getDay()]}, ${d.getDate()} ${MNS[d.getMonth()]} · ${h}:${m} ${ap}`;
}
function dayKey(iso){return iso?iso.slice(0,10):"";}
function dayLbl(ds){
  const t=new Date().toISOString().slice(0,10);
  const y=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(ds===t)return"Today"; if(ds===y)return"Yesterday";
  const d=new Date(ds); return`${DN[d.getDay()]}, ${d.getDate()} ${MNS[d.getMonth()]}`;
}

// ── CHART ───────────────────────────────────────
function drawChart(){
  const wrap=document.getElementById("chartBars"); wrap.innerHTML="";
  const months=[]; const now=new Date();
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({key:mkey(d),lbl:MNS[d.getMonth()]});}
  const totals=months.map(m=>({...m,total:db.tx.filter(t=>t.mk===m.key&&t.type==="exp").reduce((a,b)=>a+b.amt,0)}));
  const max=Math.max(...totals.map(t=>t.total),1);
  totals.forEach(m=>{
    const pct=Math.max(m.total/max*100,3);
    const isView=m.key===mkey(view);
    const col=document.createElement("div"); col.className="bar-col";
    const amtStr=m.total>=1000?`${Math.round(m.total/1000)}k`:(m.total>0?Math.round(m.total):"");
    col.innerHTML=`<div class="bar-amt">${amtStr}</div>
      <div class="bar-inner" style="height:${pct}%;background:${isView?"#3A7D5A":"#B8D9C7"};"></div>
      <div class="bar-lbl" style="font-weight:${isView?"800":"600"};color:${isView?"var(--green)":"var(--muted)"}">${m.lbl}</div>`;
    wrap.appendChild(col);
  });
}

// ── HISTORY ─────────────────────────────────────
function openHist(){
  document.getElementById("histSub").textContent=MN[view.getMonth()]+" "+view.getFullYear();
  document.getElementById("searchIn").value="";
  renderHist("");
  document.getElementById("histSheet").classList.add("on");
}
function renderHist(q){
  let tx=txMonth();
  if(q){const ql=q.toLowerCase();tx=tx.filter(t=>{const c=catById(t.cat);return c.name.toLowerCase().includes(ql)||(t.note||"").toLowerCase().includes(ql);});}
  const body=document.getElementById("histBody");
  if(!tx.length){body.innerHTML=`<div class="empty">${q?"No results for ""+q+"""":"No entries this month."}</div>`;return;}
  const groups={};
  tx.forEach(t=>{const k=dayKey(t.datetime);if(!groups[k])groups[k]=[];groups[k].push(t);});
  const days=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  body.innerHTML=days.map(d=>{
    const rows=groups[d].map(t=>{
      const c=catById(t.cat);
      const time=t.datetime?new Date(t.datetime).toLocaleTimeString("en-PK",{hour:"2-digit",minute:"2-digit"}):"";
      return `<div class="hrow" data-id="${t.id}">
        <div class="hico" style="background:${c.bg}">${c.icon}</div>
        <div class="hinfo"><div class="hcat">${c.name}</div>${t.note?`<div class="hnote">${t.note}</div>`:""}
        <div class="htime">${time}</div></div>
        <div class="hamt ${t.type==="exp"?"e":"i"}">${t.type==="exp"?"-":"+"}Rs${Math.round(t.amt).toLocaleString()}</div>
        <button class="hdel" data-id="${t.id}">✕</button>
      </div>`;
    }).join("");
    const dayTotal=groups[d].filter(t=>t.type==="exp").reduce((a,b)=>a+b.amt,0);
    return `<div class="day-grp"><div class="dlabel">${dayLbl(d)} <span style="float:right;color:var(--red)">−Rs${Math.round(dayTotal).toLocaleString()}</span></div>${rows}</div>`;
  }).join("");
  body.querySelectorAll(".hrow").forEach(r=>r.onclick=e=>{if(!e.target.classList.contains("hdel"))openEdit(Number(r.dataset.id));});
  body.querySelectorAll(".hdel").forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    const id=Number(b.dataset.id);db.tx=db.tx.filter(t=>t.id!==id);saveDb();render();renderHist(document.getElementById("searchIn").value);await push();
  });
}
document.getElementById("searchIn").oninput=e=>renderHist(e.target.value);

// ── EXPORT ───────────────────────────────────────
function openExport(){
  const sub=MN[view.getMonth()]+" "+view.getFullYear();
  document.getElementById("exportSub").textContent=sub;
  const tx=txMonth();
  const inc=tx.filter(t=>t.type==="inc").reduce((a,b)=>a+b.amt,0);
  const exp=tx.filter(t=>t.type==="exp").reduce((a,b)=>a+b.amt,0);
  const bal=inc-exp;
  const spent={};
  tx.filter(t=>t.type==="exp").forEach(t=>{spent[t.cat]=(spent[t.cat]||0)+t.amt;});
  const catRows=cats.filter(c=>spent[c.id]).sort((a,b)=>spent[b.id]-spent[a.id])
    .map(c=>`<div class="export-row"><span>${c.icon} ${c.name}</span><span style="color:var(--red)">−Rs${Math.round(spent[c.id]).toLocaleString()}</span></div>`).join("");
  document.getElementById("exportBody").innerHTML=`
    <div class="export-card">
      <h3>📊 ${sub} Summary</h3>
      <div class="export-row"><span>💰 Income</span><span style="color:var(--green)">+Rs${Math.round(inc).toLocaleString()}</span></div>
      ${catRows}
      <div class="export-row"><span>Total Spent</span><span style="color:var(--red)">−Rs${Math.round(exp).toLocaleString()}</span></div>
      <div class="export-row"><span>Balance</span><span style="color:${bal>=0?"var(--green)":"var(--red)"}">Rs${Math.round(bal).toLocaleString()}</span></div>
    </div>
    <button class="export-btn" id="shareBtn">📤 Share via WhatsApp</button>
    <button class="export-btn sec" id="copyBtn">📋 Copy to clipboard</button>`;
  const txt=buildTxt(sub,inc,exp,bal,spent);
  document.getElementById("shareBtn").onclick=()=>{window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank");};
  document.getElementById("copyBtn").onclick=()=>{navigator.clipboard.writeText(txt).then(()=>toast("Copied!"));};
  document.getElementById("exportSheet").classList.add("on");
}
function buildTxt(sub,inc,exp,bal,spent){
  let t=`*${sub} Expenses*\n\n`;
  if(inc>0)t+=`💰 Income: Rs${Math.round(inc).toLocaleString()}\n\n`;
  t+=`*By Category:*\n`;
  cats.filter(c=>spent[c.id]).sort((a,b)=>spent[b.id]-spent[a.id]).forEach(c=>{t+=`${c.icon} ${c.name}: Rs${Math.round(spent[c.id]).toLocaleString()}\n`;});
  t+=`\n💸 Total Spent: Rs${Math.round(exp).toLocaleString()}`;
  if(inc>0)t+=`\n✅ Balance: Rs${Math.round(bal).toLocaleString()}`;
  return t;
}
document.getElementById("btnExport").onclick=openExport;
document.getElementById("exportBack").onclick=()=>document.getElementById("exportSheet").classList.remove("on");

// ── MONTH NAV ────────────────────────────────────
document.getElementById("prevM").onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()-1,1);render();};
document.getElementById("nextM").onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()+1,1);render();};

// ── TOAST ────────────────────────────────────────
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),2000);}

buildKpad();buildCeModal();render();
</script>
